services:
  audio2srt:
    build: .
    image: audio2srt:latest
    container_name: audio2srt
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/models/.cache/huggingface
      - WHISPER_MODEL=large-v3
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE=float16
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "/usr/bin/python3.11", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
